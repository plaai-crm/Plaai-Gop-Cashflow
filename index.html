<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAAI Hotel Group — กระแสเงินสด &amp; ประมาณการ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f3f1ec;--card:#ffffff;--ink:#1c2536;--muted:#7a8397;--line:#e7e2d8;
  --pos:#1b7a4b;--neg:#c0392b;
  --navy:#16233d;--navy2:#243f66;--gold:#b28e4c;--gold-soft:#f3ead6;
  --accent:#243f66;
  --forecast-bg:#fdf3e0;--forecast-ink:#a9741f;--forecast-line:#eccf95;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--ink);font-size:15.5px;line-height:1.5;}
header{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;padding:16px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(20,30,60,.18);border-bottom:3px solid var(--gold);}
header .brand{display:flex;align-items:center;gap:12px;}
header .mark{width:40px;height:40px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 6px rgba(0,0,0,.2);}
header h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.06em;}
header .sub{font-size:12.5px;opacity:.82;letter-spacing:.02em;margin-top:2px;}
.asofbar{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.asofbox{font-size:13px;background:rgba(255,255,255,.12);padding:8px 14px;border-radius:10px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.15);}
.asofbox .lbl{opacity:.85;}
.asofbox b{color:var(--gold-soft);}
.asofbox input[type=date]{border:none;border-radius:6px;padding:4px 6px;font-family:inherit;font-size:12.5px;}
.asofbox label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12.5px;}
.syncbox{font-size:12.5px;background:rgba(255,255,255,.12);padding:6px 12px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,.15);}
.syncdot{width:9px;height:9px;border-radius:50%;background:#94a3b8;display:inline-block;margin-right:6px;}
nav{display:flex;gap:6px;background:#fff;padding:9px 14px;flex-wrap:wrap;border-bottom:1px solid var(--line);position:sticky;top:60px;z-index:19;box-shadow:0 1px 3px rgba(0,0,0,.03);}
nav button{border:1px solid transparent;background:#f0ede6;color:var(--ink);padding:9px 16px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:.15s;}
nav button:hover{background:#e7e2d8;}
nav button.active{background:var(--navy);color:#fff;border-color:var(--navy);}
main{padding:20px;max-width:1200px;margin:0 auto;}
.card{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 2px 10px rgba(28,37,54,.06);margin-bottom:20px;border:1px solid #efece5;}
h2{font-size:18px;margin:0 0 6px;font-weight:700;}
.hint{font-size:13px;color:var(--muted);margin:0 0 16px;line-height:1.7;}
table{border-collapse:collapse;width:100%;font-size:14px;}
th,td{padding:9px 11px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap;}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--card);}
thead th{background:#faf8f3;font-weight:700;color:#5f6980;border-bottom:2px solid var(--line);font-size:13px;}
.tblwrap{overflow-x:auto;border-radius:10px;}
tr.total td{font-weight:800;border-top:2px solid var(--navy);background:#faf8f3;}
td.pos{color:var(--pos);} td.neg{color:var(--neg);}
input.cell{width:100px;border:1px solid transparent;background:#f3f1ec;border-radius:7px;padding:7px 8px;text-align:right;font-family:inherit;font-size:14px;color:var(--ink);}
input.cell:focus{border-color:var(--gold);background:#fff;outline:none;}
input.cell.forecast{background:var(--forecast-bg);color:var(--forecast-ink);font-style:italic;border-color:var(--forecast-line);}
.pill{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;background:#f0ede6;color:var(--muted);vertical-align:middle;}
.yrtabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.yrtabs button{border:1px solid var(--line);background:#fff;padding:8px 18px;border-radius:9px;cursor:pointer;font-weight:600;font-family:inherit;font-size:14px;}
.yrtabs button.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:820px){.grid2{grid-template-columns:1fr;}}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.kpi .box{flex:1;min-width:165px;background:#faf8f3;border-radius:12px;padding:14px 16px;border:1px solid var(--line);border-left:4px solid var(--gold);}
.kpi .box .lbl{font-size:12.5px;color:var(--muted);font-weight:600;}
.kpi .box .val{font-size:23px;font-weight:800;margin-top:5px;letter-spacing:-.01em;}
.kpi .box .cap{font-size:11.5px;color:var(--muted);margin-top:3px;}
.fxrow{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.fxrow input[type=text]{flex:1;min-width:180px;padding:9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;}
.fxrow input[type=number]{width:130px;padding:9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;text-align:right;font-size:14px;}
.fxrow select{padding:9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;}
button.mini{border:none;background:#f0ede6;padding:9px 15px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;}
button.mini.primary{background:var(--navy);color:#fff;}
button.mini.gold{background:var(--gold);color:#fff;}
button.mini.danger{background:#fbe4e0;color:#a13223;}
.growthbox{display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:#faf6ee;border:1px solid #ece2cd;border-radius:12px;padding:12px 16px;margin-bottom:16px;}
.growthbox label{font-size:13.5px;font-weight:600;}
.growthbox input{width:80px;padding:7px;border:1px solid var(--line);border-radius:7px;text-align:right;font-family:inherit;font-size:14px;}
.legend{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.8;}
.legend b{color:var(--forecast-ink);}
details{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:0 14px;background:#fcfbf8;}
details[open]{padding-bottom:14px;}
summary{cursor:pointer;font-weight:700;color:var(--navy);font-size:14px;padding:13px 0;}
.subeditor{background:#faf8f3;border:1px dashed #dcd6c8;border-radius:12px;padding:14px 16px;margin:14px 0;}
.subeditor h3{margin:0 0 4px;font-size:14.5px;}
.subeditor .subtotal{font-size:13px;color:var(--muted);margin-top:8px;}
.subeditor .subtotal b{color:var(--ink);font-size:15px;}
.setupbox{background:#faf6ee;border:1px solid #ece2cd;border-radius:12px;padding:16px;font-size:13.5px;line-height:1.9;}
code{background:#f0ede6;padding:1px 6px;border-radius:4px;font-size:12.5px;}
.callout{background:#eef4fb;border:1px solid #cfe0f2;border-radius:12px;padding:13px 16px;font-size:13.5px;line-height:1.7;margin-bottom:16px;color:#26456e;}
.callout b{color:var(--navy);}
.cashpanel{border-radius:14px;padding:18px 20px;margin:16px 0;border:2px solid;}
.cashpanel.pos{background:#eaf6ef;border-color:#bfe3cd;}
.cashpanel.neg{background:#fdecea;border-color:#f3c9c2;}
.cashpanel .verdict{font-size:19px;font-weight:800;margin-bottom:14px;letter-spacing:.01em;}
.cashpanel.pos .verdict{color:#12603a;}
.cashpanel.neg .verdict{color:#8a2a1c;}
.cashcalc{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap;}
.cashcalc .item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;flex:1;min-width:150px;}
.cashcalc .item.result{border-width:2px;}
.cashcalc .item .lbl{font-size:12px;color:var(--muted);line-height:1.4;min-height:32px;}
.cashcalc .item .num{font-size:22px;font-weight:800;margin-top:4px;letter-spacing:-.01em;}
.cashcalc .op{display:flex;align-items:center;font-size:24px;font-weight:800;color:#9aa2b1;}
.cashpanel .note{margin-top:13px;font-size:13.5px;line-height:1.65;}
@media(max-width:700px){.cashcalc{flex-direction:column;}.cashcalc .op{justify-content:center;}.cashcalc .item{min-width:0;}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;z-index:50;box-shadow:0 4px 14px rgba(0,0,0,.2);}
.toast.show{opacity:1;}
/* ---- login + roles ---- */
.userchip{font-size:12.5px;background:rgba(255,255,255,.12);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:8px;}
.userchip .rl{background:var(--gold);color:#1c2536;font-weight:700;padding:1px 8px;border-radius:20px;font-size:11px;}
.userchip .rl.view{background:#94a3b8;color:#fff;}
.userchip .out{cursor:pointer;opacity:.85;text-decoration:underline;}
.viewbadge{display:inline-block;background:#fde68a;color:#8a5a12;font-weight:700;font-size:12px;padding:3px 12px;border-radius:20px;margin-left:8px;}
.login-overlay{position:fixed;inset:0;z-index:100;background:linear-gradient(120deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:#fff;border-radius:18px;padding:30px 30px 26px;width:100%;max-width:390px;box-shadow:0 12px 40px rgba(0,0,0,.3);border-top:4px solid var(--gold);}
.login-card .mk{width:54px;height:54px;border-radius:13px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
.login-card h2{text-align:center;margin:0 0 2px;font-size:19px;letter-spacing:.05em;color:var(--navy);}
.login-card .lsub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px;}
.login-card label{display:block;font-size:13px;font-weight:600;margin:12px 0 5px;color:#5f6980;}
.login-card select,.login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:15px;}
.login-card input:focus,.login-card select:focus{border-color:var(--gold);outline:none;}
.login-card .go{width:100%;margin-top:18px;padding:12px;border:none;border-radius:9px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}
.login-card .go:hover{background:var(--navy2);}
.login-card .err{color:var(--neg);font-size:13px;text-align:center;min-height:18px;margin-top:10px;}
.login-card .hintbox{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
</style>
</head>

<header>
  <div class="brand">
    <div class="mark">🏨</div>
    <div>
      <h1>PLAAI HOTEL GROUP</h1>
      <div class="sub">กระแสเงินสดหลังชำระหนี้ &amp; ค่าใช้จ่ายหลัง GOP · ประมาณการ <span id="fcRange">2026–2028</span></div>

</div>

function baseDebt(h){ return (state.hotels[h].debtItems||[]).reduce((s,x)=>s+((x.mode==='pinned')?0:(+x.amount||0)),0); }
function migrate(){
  let addedItems=false;
  HOTEL_ORDER.forEach(h=>{
    if(!state.hotels[h].debtItems){
      const jan=state.debtSchedule && state.debtSchedule['2026'] && state.debtSchedule['2026']['jan'];
      const base=(jan && jan[h]!=null)? +jan[h] : 0;
      state.hotels[h].debtItems=[{id:'loan',name:'ชำระหนี้ธนาคาร (เงินต้น+ดอกเบี้ย)',amount:base,mode:'monthly',pinnedMonth:'jan'}];
      addedItems=true;
    }
    // backfill mode fields on existing items
    state.hotels[h].debtItems.forEach(di=>{ if(!di.mode) di.mode='monthly'; if(!di.pinnedMonth) di.pinnedMonth='jan'; });
  });
  // Sparse-ify the debt schedule so line items drive the "normal" months,
  // while loan-end reductions stay as explicit month overrides.
  if(addedItems){
    HOTEL_ORDER.forEach(h=>{
      const base=baseDebt(h);
      Object.keys(state.debtSchedule).forEach(y=>{
        if(!/^\d{4}$/.test(y)) return;
        const dy=state.debtSchedule[y];
        MONTHS.forEach(m=>{ if(dy[m] && dy[m][h]!=null && +dy[m][h]===base) delete dy[m][h]; });
      });
    });
  }
  if(!state.dataAsOf) state.dataAsOf={mode:'auto',date:todayStr()};
  if(!state.settings) state.settings={};
  if(!Array.isArray(state.settings.years)||!state.settings.years.length) state.settings.years=['2026','2027','2028'];
  if(!state.settings.openingCash) state.settings.openingCash={};
  HOTEL_ORDER.forEach(h=>{ if(state.settings.openingCash[h]==null) state.settings.openingCash[h]=0; });
}

function maxForecastYear(){ const ys=forecastYears(); return Math.max(...ys.map(Number)).toString(); }

}
function withinAsOf(year,month){

}

// ---------- GOP resolver (actual or forecast from prior year * growth) ----------
function gopRaw(h,year,month){
  const g=state.hotels[h].gop;
  if(g[year] && g[year][month]!==null && g[year][month]!==undefined && g[year][month]!=='') return {v:+g[year][month],actual:true};
  return null;
}
function resolveGOP(h,year,month){
  const direct=gopRaw(h,year,month);
  if(direct) return direct;
  const py=(parseInt(year)-1).toString();
  const growth=(state.hotels[h].growth&&state.hotels[h].growth[year]!=null)?+state.hotels[h].growth[year]:0;
  let base;
  if(py==='2025'){ const b=gopRaw(h,'2025',month); base=b?b.v:null; }
  else { const r=resolveGOP(h,py,month); base=r?r.v:null; }
  if(base===null) return {v:null,actual:false};
  return {v:base*(1+growth),actual:false};
}
function debtForMonth(h,month){
  let sum=0;
  (state.hotels[h].debtItems||[]).forEach(di=>{
    const a=+di.amount||0;
    if(di.mode==='pinned'){ if(di.pinnedMonth===month) sum+=a; }
    else sum+=a; // monthly (per-month all year)
  });
  return sum;
}
function debtService(h,year,month){
  const d=state.debtSchedule[year];
  if(d && d[month] && d[month][h]!=null) return +d[month][h];  // month override (typed in cell)
  return debtForMonth(h,month);                                // else from debt line items
}
function fixedForMonth(h,year,month){
  let sum=0;
  (state.hotels[h].fixedCosts||[]).forEach(fc=>{
    const a=+fc.amount||0;
    if(fc.mode==='monthly') sum+=a;
    else if(fc.mode==='provision') sum+=a/12;
    else if(fc.mode==='pinned' && fc.pinnedMonth===month) sum+=a;
  });
  return sum;
}
function netCF(h,year,month){
  const g=resolveGOP(h,year,month).v||0;
  return g - debtService(h,year,month) - fixedForMonth(h,year,month);
}
// ---------- cash-on-hand anchor + threaded cumulative cash ----------
function cashNowVal(h){
  const v=state.hotels[h] && state.hotels[h].cashNow;
  return (v===undefined||v===null||v==='')?null:(+v);
}
function anchorInfo(h){
  const cn=cashNowVal(h);
  if(cn===null) return {has:false};
  const a=effAsOf();
  return {has:true,year:a.year,mi:a.mi,value:cn};
}
// end-of-month cumulative cash for a whole year, threaded from the cash-on-hand anchor
function cumulativeSeries(h,yr){
  const y=parseInt(yr);
  const open0=+(state.settings.openingCash[h]||0);
  const an=anchorInfo(h);
  // no anchor OR viewing a year before the anchor → original per-year behaviour
  if(!an.has || y<an.year){
    let run=open0,arr=[];MONTHS.forEach(mo=>{run+=netCF(h,yr,mo);arr.push(run);});
    return {arr,opening:open0,anchored:false,anchorMi:-1};
  }
  if(y===an.year){
    let run=open0,arr=[];
    MONTHS.forEach((mo,idx)=>{ if(idx===an.mi) run=an.value; run+=netCF(h,yr,mo); arr.push(run); });
    return {arr,opening:open0,anchored:true,anchorMi:an.mi};
  }
  // y>an.year → opening = projected cumulative at end of prior year, threaded from anchor
  let run=an.value;
  for(let idx=an.mi;idx<12;idx++) run+=netCF(h,String(an.year),MONTHS[idx]);
  for(let yy=an.year+1;yy<y;yy++) MONTHS.forEach(mo=>run+=netCF(h,String(yy),mo));
  const opening=run;let arr=[];run=opening;
  MONTHS.forEach(mo=>{run+=netCF(h,yr,mo);arr.push(run);});
  return {arr,opening,anchored:true,anchorMi:-1};
}
// yearMode: how the displayed year relates to "today"
function yearMode(yr){
  const a=effAsOf();const y=parseInt(yr);
  if(y===a.year) return 'anchor'; if(y>a.year) return 'future'; return 'past';
}
// cash position for one hotel & year → {start, net, end, worst, mode, cashNowSet}
function cashPosition(h,yr){
  const cs=cumulativeSeries(h,yr);
  const a=effAsOf();const cn=cashNowVal(h);const oc=+(state.settings.openingCash[h]||0);
  const mode=yearMode(yr);
  let start,net;
  if(mode==='anchor'){
    start=(cn!==null?cn:oc); net=0;
    for(let i=a.mi;i<12;i++) net+=netCF(h,yr,MONTHS[i]);
  } else if(mode==='future'){
    start=cs.opening; net=0; MONTHS.forEach(m=>net+=netCF(h,yr,m));
  } else {
    start=oc; net=0; MONTHS.forEach(m=>net+=netCF(h,yr,m));
  }
  const end=cs.arr[11];
  const worstArr=(mode==='anchor')?cs.arr.slice(a.mi):cs.arr;
  return {start,net,end,worst:Math.min(...worstArr),mode,cashNowSet:cn!==null};
}

  else if(currentTab==='combined') m.innerHTML=viewCombined();
  else if(currentTab==='setup') m.innerHTML=viewSetup();
  else m.innerHTML=viewHotel(currentTab);
  drawCharts();
  renderAsOf();
  const fr=document.getElementById('fcRange');
  if(fr){const fy=forecastYears();fr.textContent=fy[0]+'–'+fy[fy.length-1];}
  applyPerms();
}

// ---- combined ----
function viewCombined(){
  const yr = currentYear['_combined']||'2026';
  let rows='',tot={gop:0,debt:0,fix:0,net:0};
  const active=HOTEL_ORDER.filter(h=>!(state.hotels[h].underConstruction && !hasData(h,yr)));
  const monthNet={};MONTHS.forEach(m=>monthNet[m]=0);
  MONTHS.forEach(mo=>{
    let g=0,d=0,f=0;
    active.forEach(h=>{g+=resolveGOP(h,yr,mo).v||0;d+=debtService(h,yr,mo);f+=fixedForMonth(h,yr,mo);});
    const net=g-d-f;monthNet[mo]=net;
    tot.gop+=g;tot.debt+=d;tot.fix+=f;tot.net+=net;
    rows+=`<tr><td>${MONTH_TH[mo]} ${yr.slice(2)}</td><td>${fmt(g)}</td><td>${fmt(d)}</td><td>${fmt(f)}</td><td class="${net>=0?'pos':'neg'}">${fmt0(net)}</td></tr>`;
  });

    let net=0;MONTHS.forEach(mo=>net+=netCF(h,yr,mo));
    const cn=cashNowVal(h); if(cn!==null) anyCashNow=true;
    const p=cashPosition(h,yr); cStart+=p.start; cNet+=p.net; cEnd+=p.end;
    if(active.includes(h)) cumulativeSeries(h,yr).arr.forEach((v,i)=>monthCum[i]+=v);

  const combinedPanel=cashPanelHTML({start:cStart,net:cNet,end:cEnd,worst:cWorst,mode:cMode,cashNowSet:anyCashNow,yr,scope:'ทั้งเครือ — '});

      <div class="box"><div class="lbl">ค่าใช้จ่ายหลัง GOP รวม</div><div class="val" style="color:var(--neg)">${fmt(tot.fix)}</div><div class="cap">บาท/ปี</div></div>
      <div class="box"><div class="lbl">เงินสดสุทธิรวมทั้งปี</div><div class="val" style="color:${tot.net>=0?'var(--pos)':'var(--neg)'}">${fmt0(tot.net)}</div><div class="cap">บาท/ปี</div></div>
    </div>
    ${combinedPanel}

function hasData(h,yr){return MONTHS.some(m=>resolveGOP(h,yr,m).v!==null);}

// ================= EDIT HANDLERS =================
function editGOP(h,y,m,val){if(ro())return;const v=val.trim();state.hotels[h].gop[y]=state.hotels[h].gop[y]||{};state.hotels[h].gop[y][m]=(v===''?null:parseFloat(v.replace(/,/g,''))); save(); render();}
function editDebt(h,y,m,val){if(ro())return;state.debtSchedule[y]=state.debtSchedule[y]||{};state.debtSchedule[y][m]=state.debtSchedule[y][m]||{};state.debtSchedule[y][m][h]=parseFloat(val.replace(/,/g,''))||0;save();render();}
function editGrowth(h,y,val){if(ro())return;state.hotels[h].growth=state.hotels[h].growth||{};state.hotels[h].growth[y]=(parseFloat(val)||0)/100;save();render();}
function editOpening(h,val){if(ro())return;state.settings.openingCash[h]=parseFloat(val)||0;save();render();}
function editCashNow(h,val){if(ro())return;const v=(val===''||val===null||val===undefined)?null:(parseFloat((''+val).replace(/,/g,''))||0);state.hotels[h].cashNow=v;save();render();}
function setYear(h,y){currentYear[h]=y;render();}
function addYear(ctx){
  if(ro())return;
  const ys=forecastYears();
  const next=(Math.max(...ys.map(Number))+1).toString();
  state.settings.years=ys.concat([next]).sort((a,b)=>(+a)-(+b));
  HOTEL_ORDER.forEach(h=>{
    state.hotels[h].growth=state.hotels[h].growth||{};
    if(state.hotels[h].growth[next]==null){
      const prev=(parseInt(next)-1).toString();
      state.hotels[h].growth[next]=(state.hotels[h].growth[prev]!=null)?state.hotels[h].growth[prev]:0.03;
    }
  });
  if(ctx) currentYear[ctx]=next;
  save();render();toast('เพิ่มปี '+next+' (ประมาณการ) แล้ว');
}
function delYear(y,ctx){
  if(ro())return;
  const ys=forecastYears();
  if(ys.length<=1){toast('ต้องมีอย่างน้อย 1 ปีประมาณการ');return;}
  if(y!==maxForecastYear()){toast('ลบได้เฉพาะปีล่าสุด');return;}
  if(!confirm('ลบปี '+y+' ออกจากประมาณการ? (ข้อมูลที่กรอกในปีนี้จะถูกลบ)')) return;
  state.settings.years=ys.filter(x=>x!==y);
  HOTEL_ORDER.forEach(h=>{
    if(state.hotels[h].growth) delete state.hotels[h].growth[y];
    if(state.hotels[h].gop) delete state.hotels[h].gop[y];
  });
  if(state.debtSchedule) delete state.debtSchedule[y];
  const fb=maxForecastYear();
  Object.keys(currentYear).forEach(k=>{ if(currentYear[k]===y) currentYear[k]=fb; });
  save();render();toast('ลบปี '+y+' แล้ว');
}
function editFC(h,i,field,val){if(ro())return;state.hotels[h].fixedCosts[i][field]=val;save();render();}
function addFC(h){if(ro())return;state.hotels[h].fixedCosts.push({id:'fc'+Date.now(),name:'รายการใหม่',mode:'monthly',amount:0,pinnedMonth:'jan'});save();render();}
function delFC(h,i){if(ro())return;state.hotels[h].fixedCosts.splice(i,1);save();render();}
function editDebtItem(h,i,field,val){if(ro())return;state.hotels[h].debtItems[i][field]=val;save();render();}
function addDebtItem(h){if(ro())return;state.hotels[h].debtItems=state.hotels[h].debtItems||[];state.hotels[h].debtItems.push({id:'d'+Date.now(),name:'รายการหนี้ใหม่',amount:0,mode:'monthly',pinnedMonth:'jan'});save();render();}
function delDebtItem(h,i){if(ro())return;state.hotels[h].debtItems.splice(i,1);save();render();}
function editField(path,val){if(ro())return;setPath(state,path,val);save();render();}
function addItem(path,item){if(ro())return;let o=state;path.forEach(p=>o=o[p]);o.push(item);save();render();}

function exportJSON(){const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='plaai_hotel_data.json';a.click();}
function importJSON(inp){if(ro())return;const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{state=JSON.parse(e.target.result);migrate();save();render();toast('นำเข้าข้อมูลแล้ว');}catch(err){toast('ไฟล์ไม่ถูกต้อง');}};r.readAsText(f);}
function resetAll(){if(ro())return;if(confirm('รีเซ็ตกลับค่าตั้งต้นทั้งหมด?')){state=JSON.parse(JSON.stringify(SEED));migrate();save();render();}}

// ================= CHARTS =================
function drawCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  if(currentTab==='construction'){
    const c=state.construction;
    const srcData=c.sources.map(s=>Math.max(0,+s.amount||0));
    const useData=c.uses.map(u=>Math.max(0,+u.amount||0));
    if(document.getElementById('srcPie')&&srcData.some(x=>x>0))
      charts.s=new Chart(srcPie,{type:'doughnut',data:{labels:c.sources.map(s=>s.name),datasets:[{data:srcData,backgroundColor:['#243f66','#c0392b','#1b7a4b']}]},options:pieOpt('แหล่งเงิน')});
    if(document.getElementById('usePie')&&useData.some(x=>x>0))
      charts.u=new Chart(usePie,{type:'doughnut',data:{labels:c.uses.map(u=>u.name),datasets:[{data:useData,backgroundColor:['#b28e4c','#7c3aed','#0891b2','#64748b','#db2777','#65a30d']}]},options:pieOpt('การใช้เงิน')});
  }
  if(currentTab==='combined'){
    const yr=currentYear['_combined']||'2026';
    const active=HOTEL_ORDER.filter(h=>!(state.hotels[h].underConstruction&&!hasData(h,yr)));
    const net=MONTHS.map(mo=>active.reduce((s,h)=>s+netCF(h,yr,mo),0));
    if(document.getElementById('combChart'))
      charts.c=new Chart(combChart,{type:'bar',data:{labels:MONTHS.map(m=>MONTH_TH[m]),datasets:[{label:'เงินสดสุทธิรวม',data:net,backgroundColor:net.map(v=>v>=0?'#1b7a4b':'#c0392b')}]},options:barOpt()});
    const annual=HOTEL_ORDER.map(h=>MONTHS.reduce((s,mo)=>s+netCF(h,yr,mo),0));
    if(document.getElementById('hotelBar'))
      charts.hb=new Chart(hotelBar,{type:'bar',data:{labels:HOTEL_ORDER.map(h=>state.hotels[h].name),datasets:[{label:'เงินสดสุทธิ',data:annual,backgroundColor:HOTEL_ORDER.map(h=>state.hotels[h].color)}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>fmt(v)}}}}});
  }
  if(['prime','play','saroj','bowin','bowin2'].includes(currentTab)){
    const h=currentTab,yr=currentYear[h];
    const gop=MONTHS.map(mo=>resolveGOP(h,yr,mo).v||0);
    const net=MONTHS.map(mo=>netCF(h,yr,mo));
    if(document.getElementById('hotelChart'))
      charts.h=new Chart(hotelChart,{type:'bar',data:{labels:MONTHS.map(m=>MONTH_TH[m]),datasets:[
        {label:'GOP',data:gop,backgroundColor:'#c9b487'},
        {type:'line',label:'เงินสดสุทธิ',data:net,borderColor:'#c0392b',backgroundColor:'#c0392b',tension:.3}
      ]},options:barOpt()});
  }
}
function pieOpt(t){return{plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}},title:{display:true,text:t}}};}
function barOpt(){return{plugins:{legend:{display:true,position:'top'}},scales:{y:{ticks:{callback:v=>fmt(v)}}}};}

// ================= SUPABASE SYNC =================
function initSupabase(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY){setSync('off');return;}
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
  s.onload=connectSupabase;
  s.onerror=()=>setSync('err');
  document.head.appendChild(s);
}
function applyRemote(payload,updated){
  try{
    const rs=(typeof payload==='string')?JSON.parse(payload):payload;
    const remoteUpdated=updated||rs.updatedAt||0;
    if(!state.updatedAt||remoteUpdated>state.updatedAt){
      const focused=document.activeElement&&document.activeElement.tagName==='INPUT';
      applyingRemote=true;state=rs;migrate();localStorage.setItem('plaai_state',JSON.stringify(state));applyingRemote=false;
      if(!focused){render();renderAsOf();toast('🔄 อัปเดตจากผู้ใช้อื่น');}
    }
  }catch(e){console.error(e);}
}
function connectSupabase(){
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    setSync('connecting');
    // 1) ดึงข้อมูลล่าสุดตอนเปิด
    sb.from(SUPABASE_TABLE).select('payload,updated_at').eq('id',STATE_ID).maybeSingle()
      .then(({data,error})=>{
        if(error){console.error(error);setSync('err');return;}
        if(data && data.payload) applyRemote(data.payload,data.updated_at);
        else pushRemote();   // ยังไม่มีแถว → สร้างจากข้อมูลในเครื่อง
        setSync('on');
      });
    // 2) ฟังการเปลี่ยนแปลงแบบเรียลไทม์
    sb.channel('plaai-state-'+STATE_ID)
      .on('postgres_changes',{event:'*',schema:'public',table:SUPABASE_TABLE,filter:'id=eq.'+STATE_ID},
        p=>{const row=p.new; if(row && row.payload) applyRemote(row.payload,row.updated_at);})
      .subscribe(st=>{ if(st==='SUBSCRIBED') setSync('on'); });
  }catch(e){console.error(e);setSync('err');}
}
function pushRemote(){
  if(!sb || !canEdit)return;
  sb.from(SUPABASE_TABLE).upsert({id:STATE_ID,payload:JSON.stringify(state),updated_at:state.updatedAt||Date.now()})
    .then(({error})=>{ if(error) console.error(error); });
}
function setSync(st){const dot=document.getElementById('syncdot'),txt=document.getElementById('syncstatus');
  const map={on:['#22c55e','ซิงก์เรียลไทม์'],connecting:['#f59e0b','กำลังเชื่อม...'],off:['#94a3b8','โหมดออฟไลน์ (คลิกเพื่อตั้งค่า)'],err:['#dc2626','เชื่อมต่อไม่ได้']};
  dot.style.background=map[st][0];txt.textContent=map[st][1];}

// ================= AUTH / ROLES =================
// ro() = "read-only guard": ถ้าไม่มีสิทธิ์แก้ไข ให้เตือนแล้วบล็อก
function ro(){ if(!canEdit){toast('👁️ โหมดดูอย่างเดียว — บัญชีนี้ไม่มีสิทธิ์แก้ไข'); return true;} return false;}
function setUser(u){
  currentUser=u; canEdit=EDIT_ROLES.includes(u.role);
  try{localStorage.setItem('plaai_user',JSON.stringify({name:u.name,role:u.role}));}catch(e){}
  renderUser();
}
function renderUser(){
  const chip=document.getElementById('userchip'); if(!chip||!currentUser) return;
  const isView=!canEdit;
  chip.style.display='flex';
  chip.innerHTML=`<span>${currentUser.name}</span>`+
    `<span class="rl ${isView?'view':''}">${ROLE_LABEL[currentUser.role]||currentUser.role}</span>`+
    `<span class="out" onclick="logout()">ออก</span>`;
}
function buildLoginOptions(){
  const sel=document.getElementById('loginUser'); if(!sel) return;
  sel.innerHTML=USERS.map((u,i)=>`<option value="${i}">${u.name}</option>`).join('');
}
function doLogin(){
  const sel=document.getElementById('loginUser');
  const pin=(document.getElementById('loginPin').value||'').trim();
  const err=document.getElementById('loginErr');
  const u=USERS[+sel.value];
  if(!u){err.textContent='ไม่พบผู้ใช้';return;}
  if(String(u.pin)!==pin){err.textContent='รหัส PIN ไม่ถูกต้อง';return;}
  err.textContent='';
  setUser(u);
  document.getElementById('loginOverlay').style.display='none';
  startApp();
}
function logout(){
  try{localStorage.removeItem('plaai_user');}catch(e){}
  currentUser=null; canEdit=false;
  document.getElementById('userchip').style.display='none';
  const pin=document.getElementById('loginPin'); if(pin) pin.value='';
  document.getElementById('loginOverlay').style.display='flex';
}
function restoreSession(){
  try{
    const s=JSON.parse(localStorage.getItem('plaai_user')||'null');
    if(s && s.name){ const u=USERS.find(x=>x.name===s.name); if(u){setUser(u);return true;} }
  }catch(e){}
  return false;
}
// ปิดใช้งานช่องกรอก/ปุ่มแก้ไข เมื่อเป็นผู้ชม (นำทาง/สลับปี/สลับแท็บยังทำได้)
function applyPerms(){
  const main=document.getElementById('main'); if(!main) return;
  const editable=canEdit;
  main.querySelectorAll('input, select, textarea').forEach(el=>{ el.disabled=!editable; });
  // แสดงป้าย "ดูอย่างเดียว" ในหน้า
  if(!editable && !main.querySelector('.viewbadge-host')){
    const h2=main.querySelector('h2');
    if(h2){ const b=document.createElement('span'); b.className='viewbadge viewbadge-host'; b.textContent='👁️ ดูอย่างเดียว'; h2.appendChild(b); }
  }
  // ช่องวันที่ในหัว
  const inp=document.getElementById('asofDate'), chk=document.getElementById('asofAuto');
  if(inp && !editable) inp.disabled=true;
  if(chk) chk.disabled=!editable;
}
let appStarted=false;
function startApp(){
  if(!appStarted){ appStarted=true; initSupabase(); }
  buildNav(); render(); renderAsOf(); renderUser();
}

// ================= INIT =================
buildLoginOptions();
if(restoreSession()){
  document.getElementById('loginOverlay').style.display='none';
  startApp();
}else{
  document.getElementById('loginOverlay').style.display='flex';
}
</script>
